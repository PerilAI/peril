<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Peril — Visual feedback your coding agents understand. Turn UI annotations into structured, agent-executable tasks via MCP." />
    <title>Peril — Visual feedback your agents understand</title>

    <!-- Preload fonts for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Prevent flash of wrong theme -->
    <script>
      (function() {
        var stored = localStorage.getItem('peril-theme');
        if (stored === 'light') {
          document.documentElement.classList.add('light');
        } else if (stored === 'dark') {
          document.documentElement.classList.add('dark');
        }
        // If no stored preference, CSS handles prefers-color-scheme
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
